# Copilot OpenAI-compatible API — Docker Compose
#
# Usage:
#   docker compose up -d          # start the service
#   docker compose down           # stop and clean up
#
# First-time setup (interactive login MUST run on the host):
#   python -m copilot login       # opens a visible browser, saves session/
# Then start the container — it reuses the persisted session.
#
# The ./session directory persists browser profile + auth tokens across restarts.

services:
  copilot-api:
    build: .
    image: windows-copilot-api
    container_name: copilot-api
    ports:
      - "8000:8000"
    environment:
      # Bind inside the container; the host port is set under `ports` above.
      HOST: "0.0.0.0"
      PORT: "8000"
      # Self-imposed rate limit (see server/config.py). Tune to your account.
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-12}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-4}"
    volumes:
      # Bind-mount the local session directory into the container.
      # Sign in once on the host (`python -m copilot login`) so this folder
      # is populated; the container reuses the browser profile + token.
      - ./session:/app/session
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
